name: CI Package

on:
  workflow_call:

jobs:
  package:
    name: Package (DEB + RPM)
    runs-on: ubuntu-22.04
    env:
      CARGO_TERM_COLOR: always
      CMAKE_BUILD_PARALLEL_LEVEL: 2
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install system dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            cmake \
            ninja-build \
            pkg-config \
            libssl-dev \
            rpm

      - name: Set up Rust (stable)
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Cache cargo + build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            tempoch/target
            tempoch/tempoch-ffi/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Configure (CMake, Release)
        shell: bash
        run: |
          set -euo pipefail
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DTEMPOCH_BUILD_DOCS=OFF \
            -DINSTALL_GTEST=OFF

      - name: Build (full)
        shell: bash
        run: cmake --build build

      - name: Install to staging prefix
        shell: bash
        run: cmake --install build --prefix build/staging

      - name: Copy shared libraries to staging
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p build/staging/lib
          cp tempoch/target/release/libtempoch_ffi.so \
             build/staging/lib/ || true

      - name: Generate packages (CPack)
        shell: bash
        run: |
          set -euo pipefail
          cd build
          cpack --config CPackConfig.cmake -G "DEB;RPM" -B packages
          ls -lh packages/

      - name: Upload DEB package
        uses: actions/upload-artifact@v4
        with:
          name: tempoch-cpp-deb
          path: build/packages/*.deb
          retention-days: 30

      - name: Upload RPM package
        uses: actions/upload-artifact@v4
        with:
          name: tempoch-cpp-rpm
          path: build/packages/*.rpm
          retention-days: 30
