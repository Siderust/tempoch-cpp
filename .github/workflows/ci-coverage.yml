name: CI Coverage

on:
  workflow_call:

jobs:
  coverage:
    name: Test & Coverage
    runs-on: ubuntu-22.04
    env:
      CARGO_TERM_COLOR: always
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install system dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            cmake \
            ninja-build \
            pkg-config \
            libssl-dev \
            gcovr

      - name: Set up Rust (stable)
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Configure (CMake, coverage)
        shell: bash
        run: |
          set -euo pipefail
          cmake -S . -B build-coverage -G Ninja \
            -DTEMPOCH_BUILD_DOCS=OFF \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_FLAGS="--coverage" \
            -DCMAKE_EXE_LINKER_FLAGS="--coverage"

      - name: Build tests
        shell: bash
        run: |
          set -euo pipefail
          cmake --build build-coverage --target test_ffi

      - name: Run tests
        shell: bash
        run: |
          set -euo pipefail
          ctest --test-dir build-coverage --output-on-failure -L tempoch_cpp

      - name: Coverage (Cobertura XML)
        shell: bash
        run: |
          set -euo pipefail
          gcovr \
            --root . \
            --exclude 'build-coverage/.*' \
            --exclude 'tempoch/.*' \
            --exclude 'tests/.*' \
            --exclude 'examples/.*' \
            --xml \
            --output coverage.xml

      - name: Coverage (HTML)
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p coverage_html
          gcovr \
            --root . \
            --exclude 'build-coverage/.*' \
            --exclude 'tempoch/.*' \
            --exclude 'tests/.*' \
            --exclude 'examples/.*' \
            --html-details \
            --output coverage_html/index.html

      - name: Build coverage summary (Markdown)
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: coverage.xml
          badge: true
          format: markdown
          output: file

      - name: Publish to Job Summary
        shell: bash
        run: cat code-coverage-results.md >> "$GITHUB_STEP_SUMMARY"
