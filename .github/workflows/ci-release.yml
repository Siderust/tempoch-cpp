name: CI Release

on:
  workflow_call:
    secrets:
      PAGES_DEPLOY_TOKEN:
        required: true

jobs:
  release:
    name: GitHub Release + APT/RPM repositories
    runs-on: ubuntu-22.04

    permissions:
      contents: write

    steps:
      - name: Download DEB artifact
        uses: actions/download-artifact@v4
        with:
          name: tempoch-cpp-deb
          path: dist/

      - name: Download RPM artifact
        uses: actions/download-artifact@v4
        with:
          name: tempoch-cpp-rpm
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Install repository tools
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            dpkg-dev \
            createrepo-c

      - name: Generate APT repository
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p site/apt
          cp dist/*.deb site/apt/

          cd site/apt
          dpkg-scanpackages . /dev/null | gzip -9c > Packages.gz

      - name: Generate RPM repository
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p site/rpm
          cp dist/*.rpm site/rpm/

          createrepo_c site/rpm

      - name: Publish repositories to siderust.github.io
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.PAGES_DEPLOY_TOKEN }}
          external_repository: Siderust/siderust.github.io
          publish_branch: main
          publish_dir: ./site
          destination_dir: .
          keep_files: true