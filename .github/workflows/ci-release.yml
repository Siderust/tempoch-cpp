name: CI Release

on:
  workflow_call:
    secrets:
      PAGES_DEPLOY_TOKEN:
        required: true

jobs:
  release:
    name: GitHub Release + APT/RPM repositories
    runs-on: ubuntu-22.04

    permissions:
      contents: write

    steps:
      - name: Download DEB artifact
        uses: actions/download-artifact@v4
        with:
          name: tempoch-cpp-deb
          path: dist/

      - name: Download RPM artifact
        uses: actions/download-artifact@v4
        with:
          name: tempoch-cpp-rpm
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Checkout Pages repository
        uses: actions/checkout@v4
        with:
          repository: Siderust/siderust.github.io
          token: ${{ secrets.PAGES_DEPLOY_TOKEN }}
          path: pages
          ref: main

      - name: Install repository tools
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            dpkg-dev \
            createrepo-c

      - name: Update APT/RPM repositories
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p pages/apt
          mkdir -p pages/rpm

          cp dist/*.deb pages/apt/
          cp dist/*.rpm pages/rpm/

          cd pages/apt
          dpkg-scanpackages . /dev/null | gzip -9c > Packages.gz

          cd ../rpm
          createrepo_c .

      - name: Commit package repository updates
        shell: bash
        run: |
          set -euo pipefail
          cd pages

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add apt rpm

          if git diff --cached --quiet; then
            echo "No package repository changes"
          else
            git commit -m "Update package repositories"
            git push origin main
          fi
