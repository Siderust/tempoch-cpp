name: CI Lint

on:
  workflow_call:

jobs:
  lint-cpp:
    name: C++ Lint (clang-format + clang-tidy)
    runs-on: ubuntu-22.04
    env:
      CARGO_TERM_COLOR: always
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install system dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake \
            ninja-build \
            clang-tidy

      - name: Install clang-format 18
        shell: bash
        run: |
          set -euo pipefail
          wget -qO /tmp/llvm.sh https://apt.llvm.org/llvm.sh
          sudo bash /tmp/llvm.sh 18
          sudo apt-get install -y --no-install-recommends clang-format-18
          sudo ln -sf /usr/bin/clang-format-18 /usr/local/bin/clang-format
          clang-format --version

      - name: Set up Rust (stable)
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Run lint pipeline
        shell: bash
        run: |
          set -euo pipefail
          ./scripts/lint.sh --check
